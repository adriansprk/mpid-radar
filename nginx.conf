server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress the embedded-dataset HTML and the data files (big text payloads).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/csv image/svg+xml;

    # Lightweight health endpoint for the container health check.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # latest.json / latest.csv are served from /data on the deployed site too.
    location ~* \.(?:css|js|json|csv)$ {
        add_header Cache-Control "public, max-age=300";
    }
}
